name: check

on:
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

env:
  GO_VERSIONS: '["1.25", "1.26"]'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      go_versions: ${{ steps.go_versions.outputs.go_versions }}
    steps:
      - id: go_versions
        run: echo 'go_versions=["1.25", "1.26"]' >> "$GITHUB_OUTPUT"

  lint:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        go: ${{ fromJSON(needs.setup.outputs.go_versions) }}
    name: "golangci-lint / go@${{ matrix.go }}"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '${{ matrix.go }}'
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: 'v2.12.0'
  unit-test:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        go: ${{ fromJSON(needs.setup.outputs.go_versions) }}
    name: "unit tests / go@${{ matrix.go }}"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '${{ matrix.go }}'
      - run: go test -v ./...
  release-test:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        go: ${{ fromJSON(needs.setup.outputs.go_versions) }}
    name: "release test / go@${{ matrix.go }}"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '${{ matrix.go }}'
          cache: false
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: '~> 2'
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check the linux build version
        run: ./dist/etc-hosts-proxy_linux_amd64_v1/etc-hosts-proxy --version
